cashflow-analyzer:
  build: ./services/cashflow-analyzer
  ports:
    - "8002:8002"
  environment:
    - DATABASE_URL=postgresql://user:pass@postgres:5432/cashflow_db
    - REDIS_URL=redis://redis:6379/0
    - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
  depends_on:
    - postgres
    - redis
    - kafka
  networks:
    - mpesa-saas-network
